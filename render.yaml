services:
  - type: web
    name: emrsystem-api
    env: node
    plan: free
    rootDir: EMRsystem
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ROBOFLOW_API_KEY
        sync: false
