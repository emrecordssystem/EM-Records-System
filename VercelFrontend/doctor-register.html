<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Registration | EMR System</title>
  <link rel="stylesheet" href="styles.css">
  <script src="api-config.js"></script>
  <script src="password-toggle.js" defer></script>
</head>
<body>
  <main class="container">
    <header class="brand">
      <h1>Doctor Registration</h1>
      <p>Admin-only doctor account creation</p>
    </header>
    
    <section class="card">
      <form id="doctorRegForm">
        <div class="field">
          <label for="doctorEmail">Email</label>
          <input type="email" id="doctorEmail" required>
        </div>
        <div class="field">
          <label for="doctorPassword">Password</label>
          <input type="password" id="doctorPassword" required minlength="6" data-password-toggle>
        </div>
        <div class="field">
          <label for="doctorName">Full Name</label>
          <input type="text" id="doctorName" required>
        </div>
        <div class="field">
          <label for="doctorLicense">License Number</label>
          <input type="text" id="doctorLicense" required>
        </div>
        <div class="field" style="display: flex; gap: 0.5rem; align-items: flex-start;">
          <input type="checkbox" id="doctorConsent" required>
          <label for="doctorConsent">Data Privacy Act 2012 Consent</label>
        </div>
        <button type="submit" class="primary">Create Doctor Account</button>
        <p class="hint" id="doctorHint"></p>
      </form>
    </section>
  </main>

  <script>
    const API_BASE_URL = window.PROFELECT_API_BASE_URL;

    document.getElementById('doctorRegForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const doctorHint = document.getElementById('doctorHint');
      const submitButton = e.currentTarget.querySelector('button[type="submit"]');
      doctorHint.textContent = '';
      
      if (!document.getElementById('doctorConsent').checked) {
        doctorHint.textContent = 'Must consent to privacy policy';
        return;
      }

      const payload = {
        role: 'doctor',
        email: document.getElementById('doctorEmail').value.trim(),
        password: document.getElementById('doctorPassword').value,
        privacyConsent: true,
        displayName: document.getElementById('doctorName').value.trim(),
        license: document.getElementById('doctorLicense').value.trim()
      };

      try {
        submitButton.disabled = true;
        doctorHint.textContent = 'Creating doctor account...';

        const response = await fetch(`${API_BASE_URL}/api/register`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        
        const data = await response.json().catch(() => ({}));
        
        if (response.ok && data.success) {
          alert('Doctor account created! Login at main page.');
          window.location.href = 'index.html';
        } else {
          doctorHint.textContent = data.message || 'Doctor registration failed.';
          submitButton.disabled = false;
        }
      } catch (err) {
        doctorHint.textContent = `Server error: ${err.message}`;
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
