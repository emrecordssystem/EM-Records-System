<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMR Login | Simple</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: system-ui; max-width: 400px; margin: 4rem auto; padding: 2rem; background: #f8fafc; }
    .form { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 0.75rem; margin: 0.5rem 0 1rem; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 0.75rem; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    button:hover { background: #2563eb; }
    .error { color: #ef4444; margin: 0.5rem 0; font-size: 0.9rem; }
    .register { text-align: center; margin-top: 1rem; }
    .register a { color: #3b82f6; text-decoration: none; font-weight: 500; }
  </style>
  <script src="api-config.js"></script>
  <script src="password-toggle.js" defer></script>
</head>
<body>
  <div class="form">
    <h2 style="text-align: center; margin-bottom: 1.5rem; color: #1e293b;">EMR System Login</h2>
    
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required minlength="6" data-password-toggle>
      <button type="submit">Login</button>
      <div id="error" class="error" style="display: none;"></div>
    </form>
    
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      
      errorEl.style.display = 'none';
      
      try {
        const response = await fetch(`${window.PROFELECT_API_BASE_URL}/api/login`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email, password})
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('authUser', JSON.stringify(data.user));
          
          if (data.user.role === 'patient') {
            window.location.href = 'dashboard.html';
          } else if (data.user.role === 'doctor') {
            window.location.href = 'doctor-dashboard.html';
          } else if (data.user.role === 'staff') {
            window.location.href = 'staff.html';
          } else if (data.user.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
          }
        } else {
          errorEl.textContent = data.message || 'Login failed';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Server error. Please try again.';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
